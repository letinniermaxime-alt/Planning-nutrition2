  document.getElementById('recipe-modal').classList.add('open');
  renderRecipeBody();
}
function closeRecipes() {
  document.getElementById('recipe-modal').classList.remove('open');
}

var editingRecipeId = null;

function renderRecipeBody() {
  var body = document.getElementById('recipe-body');
  body.innerHTML = '';

  var section = document.createElement('div'); section.className = 'recipe-section';
  var title = document.createElement('div'); title.className = 'recipe-section-title';
  title.textContent = RECIPES.length + ' recette' + (RECIPES.length > 1 ? 's' : '');
  section.appendChild(title);

  if(RECIPES.length === 0) {
    var empty = document.createElement('div'); empty.className = 'empty-state';
    empty.textContent = 'Aucune recette. Crée ta première recette ci-dessous.';
    section.appendChild(empty);
  } else {
    var list = document.createElement('div'); list.className = 'recipe-list';
    RECIPES.forEach(function(recipe) {
      var servings = recipe.servings || 1;
      var totalMacros = calcRecipeMacros(recipe.rows);
      var perServing = calcRecipeMacrosForServings(recipe.rows, servings, 1);
      var fm = getFM();
      var item = document.createElement('div'); item.className = 'recipe-item';

      // Header
      var hdr = document.createElement('div'); hdr.className = 'recipe-item-hdr';
      var nameDiv = document.createElement('div'); nameDiv.className = 'recipe-item-name';
      nameDiv.textContent = recipe.name;
      var acts = document.createElement('div'); acts.className = 'recipe-item-actions';
      var eb = document.createElement('button'); eb.className = 'btn-edit-r'; eb.textContent = 'Modifier';
      eb.onclick = (function(rid){ return function(){ showRecipeForm(rid); }; })(recipe.id);
      var db = document.createElement('button'); db.className = 'btn-del-r'; db.textContent = 'X';
      db.onclick = (function(rid){ return function(){ deleteRecipe(rid); }; })(recipe.id);
      acts.appendChild(eb); acts.appendChild(db);
      hdr.appendChild(nameDiv); hdr.appendChild(acts);
      item.appendChild(hdr);

      // Portions info
      var portDiv = document.createElement('div');
      portDiv.style.cssText = 'font-size:.67rem;color:var(--teal);font-weight:600;margin-bottom:3px';
      portDiv.textContent = servings + ' portion' + (servings > 1 ? 's' : '') + ' au total';
      item.appendChild(portDiv);

      // Macros par portion + total
      var macroDiv = document.createElement('div'); macroDiv.className = 'recipe-item-macros';
      macroDiv.innerHTML = '1 portion : <span class="rkcal">' + perServing.kcal + ' kcal</span>'
        + ' &middot; P:<span class="rp">' + perServing.p + 'g</span>'
        + ' G:' + perServing.g + 'g L:' + perServing.l + 'g'
        + '<span style="color:var(--dim);margin-left:6px">| Total: ' + totalMacros.kcal + ' kcal</span>';
      item.appendChild(macroDiv);

      // Ingredients
      var ingDiv = document.createElement('div'); ingDiv.className = 'recipe-ingredients';
      ingDiv.textContent = recipe.rows.map(function(r){
        var f = fm[r.foodId]; return f ? (r.qty + f.unit + ' ' + f.name) : '';
      }).filter(Boolean).join(' · ');
      item.appendChild(ingDiv);

      list.appendChild(item);
    });
    section.appendChild(list);
  }
  body.appendChild(section);

  var addBtn = document.createElement('button'); addBtn.className = 'btn-add-food';
  addBtn.innerHTML = '+ Nouvelle recette';
  addBtn.style.borderColor = 'rgba(78,247,200,.3)'; addBtn.style.color = 'var(--teal)';
  addBtn.onclick = function(){ showRecipeForm(null); };
  body.appendChild(addBtn);
}

function showRecipeForm(id) {
  editingRecipeId = id;
  var existing = document.getElementById('recipe-form-wrap'); if(existing) existing.remove();
  var recipe = id ? RECIPES.find(function(r){ return r.id === id; }) : null;
  var servings = recipe ? (recipe.servings || 1) : 1;

  var wrap = document.createElement('div'); wrap.id = 'recipe-form-wrap';
  wrap.className = 'recipe-form';
  wrap.innerHTML = '<h3>' + (recipe ? 'Modifier la recette' : 'Nouvelle recette') + '</h3>'
    + '<div class="form-grid">'
    + '<div class="fg-item"><label>Nom de la recette</label>'
    + '<input type="text" id="rf-name" placeholder="Ex: Pancakes proteines" value="' + (recipe ? recipe.name : '') + '"></div>'
    + '<div class="fg-item"><label>Nombre de portions</label>'
    + '<input type="number" id="rf-servings" min="1" step="1" value="' + servings + '" style="width:100%"></div>'
    + '</div>'
    + '<div style="font-family:Syne,sans-serif;font-size:.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 5px">'
    + 'Ingredients (quantites totales pour toutes les portions)</div>'
    + '<div class="recipe-rows" id="rf-rows"></div>'
    + '<div class="recipe-form-total" id="rf-total">Total : --</div>'
    + '<button class="btn-add-recipe-row" onclick="addRecipeRow()">+ Ajouter un ingredient</button>'
    + '<div class="form-actions">'
    + '<button class="btn-save-form" style="background:var(--teal)" onclick="saveRecipe()">Enregistrer</button>'
    + '<button class="btn-cancel-form" onclick="cancelRecipeForm()">Annuler</button>'
    + '</div>';

  document.getElementById('recipe-body').appendChild(wrap);
  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});

  // Bind servings input to update total display
  setTimeout(function() {
    var sIn = document.getElementById('rf-servings');
    if(sIn) sIn.oninput = function(){ updateRecipeFormTotal(); };
  }, 50);

  var initRows = recipe ? recipe.rows : [{foodId:'poulet', qty:100}];
  initRows.forEach(function(r){ addRecipeRow(r.foodId, r.qty); });
  updateRecipeFormTotal();
  document.getElementById('rf-name').focus();
}

function addRecipeRow(foodId, qty) {
  var container = document.getElementById('rf-rows'); if(!container) return;
  var fm = getFM();
  var fid = foodId || 'poulet';
  var fqty = qty || 100;
  var row = document.createElement('div'); row.className = 'recipe-row';
  var sel = buildSelect(fid);
  sel.onchange = function(){ updateUnitLabel(); updateRecipeFormTotal(); };
  var qIn = document.createElement('input'); qIn.type = 'number'; qIn.value = fqty; qIn.min = 0; qIn.step = 5;
  qIn.oninput = function(){ updateRecipeFormTotal(); };
  var unitSp = document.createElement('span'); unitSp.className = 'recipe-row-unit';
  var f = fm[fid]; unitSp.textContent = f ? f.unit : 'g';
  var delBtn = document.createElement('button'); delBtn.className = 'recipe-row-del'; delBtn.textContent = 'x';
  delBtn.onclick = function(){ row.remove(); updateRecipeFormTotal(); };
  function updateUnitLabel() {
    var fm2 = getFM(); var f2 = fm2[sel.value]; if(f2) unitSp.textContent = f2.unit;
  }
  row._getData = function() { return {foodId:sel.value, qty:parseFloat(qIn.value)||0}; };
  row.appendChild(sel); row.appendChild(qIn); row.appendChild(unitSp); row.appendChild(delBtn);
  container.appendChild(row);
}

function updateRecipeFormTotal() {
  var totalEl = document.getElementById('rf-total'); if(!totalEl) return;
  var rows = getRecipeFormRows();
  var sIn = document.getElementById('rf-servings');
  var servings = sIn ? (parseFloat(sIn.value) || 1) : 1;
  var total = calcRecipeMacros(rows);
  var perS = calcRecipeMacrosForServings(rows, servings, 1);
  totalEl.innerHTML = 'Total (' + servings + ' portion' + (servings>1?'s':'') + ') : <b>' + total.kcal + ' kcal</b>'
    + ' &middot; 1 portion : <b style="color:var(--teal)">' + perS.kcal + ' kcal</b>'
    + ' P:' + perS.p + 'g G:' + perS.g + 'g L:' + perS.l + 'g';
}

function getRecipeFormRows() {
  var rows = [];
  document.querySelectorAll('#rf-rows .recipe-row').forEach(function(r){ if(r._getData) rows.push(r._getData()); });
  return rows;
}

function cancelRecipeForm() {
  var f = document.getElementById('recipe-form-wrap'); if(f) f.remove();
  editingRecipeId = null;
}

function saveRecipe() {
  var name = document.getElementById('rf-name').value.trim();
  if(!name) { alert('Donne un nom a ta recette !'); return; }
  var sIn = document.getElementById('rf-servings');
  var servings = sIn ? Math.max(1, parseFloat(sIn.value) || 1) : 1;
  var rows = getRecipeFormRows();
  if(rows.length === 0) { alert('Ajoute au moins un ingredient !'); return; }

  if(editingRecipeId) {
    var idx = RECIPES.findIndex(function(r){ return r.id === editingRecipeId; });
    if(idx >= 0) RECIPES[idx] = {id:editingRecipeId, name:name, servings:servings, rows:rows};
  } else {
    RECIPES.push({id:'r_' + Date.now(), name:name, servings:servings, rows:rows});
  }
  saveRecipes();
  showToast(editingRecipeId ? 'Recette modifiee !' : 'Recette enregistree !');
  editingRecipeId = null;
  renderRecipeBody();
}

function deleteRecipe(id) {
  var recipe = RECIPES.find(function(r){ return r.id===id; });
  if(!confirm('Supprimer "' + recipe.name + '" ?')) return;
  RECIPES = RECIPES.filter(function(r){ return r.id !== id; });
  saveRecipes(); showToast('Recette supprimee'); renderRecipeBody();
}

// ── Insert recipe into a meal (with portion picker) ──
function showRecipePicker(card, dayKey, mealIdx) {
  var existing = card.querySelector('.recipe-picker-wrap'); if(existing) { existing.remove(); return; }
  if(RECIPES.length === 0) { showToast('Aucune recette. Cree-en une !'); return; }

  var wrap = document.createElement('div'); wrap.className = 'recipe-picker-wrap';

  // Recipe select
  var sel = document.createElement('select');
  var defaultOpt = document.createElement('option'); defaultOpt.value = ''; defaultOpt.textContent = '-- Choisir une recette --';
  sel.appendChild(defaultOpt);
  RECIPES.forEach(function(recipe) {
    var s = recipe.servings || 1;
    var perS = calcRecipeMacrosForServings(recipe.rows, s, 1);
    var opt = document.createElement('option'); opt.value = recipe.id;
    opt.textContent = recipe.name + ' (' + s + ' portion' + (s>1?'s':'') + ' | 1 port = ' + perS.kcal + ' kcal)';
    sel.appendChild(opt);
  });

  // Portion input row
  var portRow = document.createElement('div');
  portRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin:6px 0;display:none';
  var portLabel = document.createElement('span');
  portLabel.style.cssText = 'font-size:.7rem;color:var(--muted);white-space:nowrap';
  portLabel.textContent = 'Nombre de portions :';
  var portIn = document.createElement('input');
  portIn.type = 'number'; portIn.value = 1; portIn.min = 0.5; portIn.step = 0.5;
  portIn.style.cssText = 'width:55px;background:var(--surface);border:1px solid rgba(78,247,200,.3);border-radius:6px;color:var(--text);font-family:Syne,sans-serif;font-size:.78rem;font-weight:600;padding:4px 5px;text-align:center;-moz-appearance:textfield';
  portRow.appendChild(portLabel); portRow.appendChild(portIn);

  // Preview div (ingredients + macros for selected portions)
  var previewDiv = document.createElement('div');
  previewDiv.style.cssText = 'font-size:.67rem;color:var(--muted);margin-bottom:6px;min-height:18px;line-height:1.5';

  function updatePreview() {
    var recipe = RECIPES.find(function(r){ return r.id===sel.value; });
    if(!recipe) { previewDiv.innerHTML = ''; portRow.style.display='none'; return; }
    portRow.style.display = 'flex';
    var s = recipe.servings || 1;
    var w = parseFloat(portIn.value) || 1;
    var macros = calcRecipeMacrosForServings(recipe.rows, s, w);
    var fm = getFM();
    var ingText = recipe.rows.map(function(r){
      var f = fm[r.foodId]; if(!f) return '';
      var scaledQty = Math.round(r.qty * w / s);
      return scaledQty + f.unit + ' ' + f.name;
    }).filter(Boolean).join(' · ');
    previewDiv.innerHTML = '<span style="color:var(--accent);font-weight:600">' + macros.kcal + ' kcal</span>'
      + ' P:' + macros.p + 'g G:' + macros.g + 'g L:' + macros.l + 'g'
      + '<br>' + ingText;
  }

  sel.onchange = function(){ updatePreview(); };
  portIn.oninput = function(){ updatePreview(); };

  var actDiv = document.createElement('div'); actDiv.className = 'recipe-picker-actions';
  var insertBtn = document.createElement('button'); insertBtn.className = 'btn-insert-recipe'; insertBtn.textContent = 'Inserer';
  insertBtn.onclick = function() {
    var recipe = RECIPES.find(function(r){ return r.id===sel.value; });
    if(!recipe) { showToast('Selectionne une recette'); return; }
    var wantedServings = parseFloat(portIn.value) || 1;
    insertRecipeIntoMeal(recipe, wantedServings, card, dayKey, mealIdx);
    wrap.remove();
  };
  var cancelBtn = document.createElement('button'); cancelBtn.className = 'btn-cancel-recipe-pick'; cancelBtn.textContent = 'Annuler';
  cancelBtn.onclick = function(){ wrap.remove(); };
  actDiv.appendChild(insertBtn); actDiv.appendChild(cancelBtn);

  wrap.appendChild(sel); wrap.appendChild(portRow); wrap.appendChild(previewDiv); wrap.appendChild(actDiv);
  var addRowBtn = card.querySelector('.btn-add-row');
  if(addRowBtn) card.insertBefore(wrap, addRowBtn); else card.appendChild(wrap);
  sel.focus();
}

function restoreRecipeGroup(name, savedRows, card, dayKey, mealIdx) {
  var group = document.createElement('div'); group.className = 'recipe-group';
  group.dataset.recipeGroup = name;

  var hdr = document.createElement('div'); hdr.className = 'recipe-group-hdr';
  var nameSpan = document.createElement('span'); nameSpan.className = 'recipe-group-name';
  nameSpan.textContent = '🍳 ' + name;
  var metaWrap = document.createElement('div'); metaWrap.style.cssText = 'display:flex;align-items:center;gap:6px';
  var kcalSpan = document.createElement('span'); kcalSpan.className = 'recipe-group-kcal';
  var delBtn = document.createElement('button'); delBtn.className = 'recipe-group-del'; delBtn.textContent = '✕';
  delBtn.title = 'Supprimer cette recette du repas';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    if(confirm('Retirer "' + name + '" du repas ?')) { group.remove(); updateDay(dayKey); savePlan(); }
  };
  var chevron = document.createElement('span'); chevron.className = 'recipe-group-chevron'; chevron.textContent = '▼';
  metaWrap.appendChild(kcalSpan); metaWrap.appendChild(delBtn); metaWrap.appendChild(chevron);
  hdr.appendChild(nameSpan); hdr.appendChild(metaWrap);

  var body = document.createElement('div'); body.className = 'recipe-group-body';

  hdr.onclick = function() {
    var isOpen = body.classList.toggle('open');
    chevron.classList.toggle('open', isOpen);
  };

  // Restaurer les aliments
  (savedRows||[]).forEach(function(r) {
    if(!r.foodId) return;
    var row = buildFoodRow(r.foodId, r.qty, dayKey, mealIdx, r.locked||false);
    body.appendChild(row);
  });

  group.appendChild(hdr); group.appendChild(body);

  function updateGroupKcal() {
    var total = 0;
    body.querySelectorAll('.food-row').forEach(function(r){ if(r._calc) total += r._calc().kcal; });
    kcalSpan.textContent = Math.round(total) + ' kcal';
  }
  updateGroupKcal();

  group._getRows = function() {
    var rows = [];
    body.querySelectorAll('.food-row').forEach(function(r){ if(r._getState) rows.push(r._getState()); });
    return rows;
  };
  group._isRecipeGroup = true;

  var addRowBtn = card.querySelector('.btn-add-row');
  if(addRowBtn) card.insertBefore(group, addRowBtn);
  else card.appendChild(group);
}

function insertRecipeIntoMeal(recipe, wantedServings, card, dayKey, mealIdx) {
  var totalServings = recipe.servings || 1;
  var ratio = wantedServings / totalServings;

  // Créer le bloc groupe recette
  var group = document.createElement('div'); group.className = 'recipe-group';
  group.dataset.recipeGroup = recipe.name;

  // Header cliquable
  var hdr = document.createElement('div'); hdr.className = 'recipe-group-hdr';
  var nameSpan = document.createElement('span'); nameSpan.className = 'recipe-group-name';
  nameSpan.textContent = '🍳 ' + recipe.name + (wantedServings !== 1 ? ' ×' + wantedServings : '');
  var metaWrap = document.createElement('div'); metaWrap.style.cssText = 'display:flex;align-items:center;gap:6px';
  var kcalSpan = document.createElement('span'); kcalSpan.className = 'recipe-group-kcal'; kcalSpan.id = 'rg-kcal-' + Date.now();
  var delBtn = document.createElement('button'); delBtn.className = 'recipe-group-del'; delBtn.textContent = '✕';
  delBtn.title = 'Supprimer cette recette du repas';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    if(confirm('Retirer "' + recipe.name + '" du repas ?')) {
      group.remove(); updateDay(dayKey); savePlan();
    }
  };
  var chevron = document.createElement('span'); chevron.className = 'recipe-group-chevron'; chevron.textContent = '▼';
  metaWrap.appendChild(kcalSpan); metaWrap.appendChild(delBtn); metaWrap.appendChild(chevron);
  hdr.appendChild(nameSpan); hdr.appendChild(metaWrap);

  // Body avec les food rows
  var body = document.createElement('div'); body.className = 'recipe-group-body';

  // Toggle collapse
  hdr.onclick = function() {
    var isOpen = body.classList.toggle('open');
    chevron.classList.toggle('open', isOpen);
  };

  // Ajouter les aliments
  recipe.rows.forEach(function(r) {
    var scaledQty = Math.max(1, Math.round(r.qty * ratio));
    var row = buildFoodRow(r.foodId, scaledQty, dayKey, mealIdx, false);
    // Override updateDay pour aussi mettre à jour le kcal du groupe
    var origSetQty = row._setQty.bind(row);
    row._setQty = function(v) { origSetQty(v); updateGroupKcal(); };
    body.appendChild(row);
  });

  group.appendChild(hdr); group.appendChild(body);

  // Fonction de mise à jour du total kcal du groupe
  function updateGroupKcal() {
    var total = 0;
    body.querySelectorAll('.food-row').forEach(function(r){ if(r._calc){ total += r._calc().kcal; } });
    kcalSpan.textContent = Math.round(total) + ' kcal';
  }
  updateGroupKcal();

  // _getGroupRows pour savePlan
  group._getRows = function() {
    var rows = [];
    body.querySelectorAll('.food-row').forEach(function(r){ if(r._getState) rows.push(r._getState()); });
    return rows;
  };
  group._isRecipeGroup = true;

  // Insérer dans le repas avant le bouton +
  var addRowBtn = card.querySelector('.btn-add-row');
  if(addRowBtn) card.insertBefore(group, addRowBtn);
  else card.appendChild(group);

  updateDay(dayKey); savePlan();
  var s = wantedServings;
  showToast('Recette "' + recipe.name + '" - ' + s + ' portion' + (s>1?'s':'') + ' insérée !');
}

// COPY MEAL
// ═══════════════════════════════════════════
function showCopyMealPicker(card, srcDay, mealIdx) {
  // Toggle — remove if already open
  var existing = card.querySelector('.copy-meal-wrap');
  if(existing) { existing.remove(); return; }
  // Also close any recipe picker open
  var rp = card.querySelector('.recipe-picker-wrap'); if(rp) rp.remove();

  // Collect current rows state
  function getCurrentRows() {
    var rows = [];
    card.querySelectorAll('.food-row').forEach(function(r){ if(r._getState) rows.push(r._getState()); });
    return rows;
  }

  var wrap = document.createElement('div'); wrap.className = 'copy-meal-wrap';
  var title = document.createElement('div'); title.className = 'copy-meal-title';
  title.textContent = 'Copier ce repas vers :';
  wrap.appendChild(title);

  var grid = document.createElement('div'); grid.className = 'copy-days-grid';
  var selectedDays = [];

  DAY_KEYS.forEach(function(d) {
    var btn = document.createElement('button'); btn.className = 'copy-day-btn';
    btn.textContent = DAY_LABELS[d].slice(0,3);
    if(d === srcDay) { btn.disabled = true; btn.title = 'Jour source'; }
    else {
      btn.onclick = function() {
        var idx = selectedDays.indexOf(d);
        if(idx === -1) selectedDays.push(d); else selectedDays.splice(idx, 1);
        btn.classList.toggle('sel', selectedDays.indexOf(d) >= 0);
        doBtn.disabled = selectedDays.length === 0;
      };
    }
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);

  var acts = document.createElement('div'); acts.className = 'copy-actions';

  var doBtn = document.createElement('button'); doBtn.className = 'btn-do-copy';
  doBtn.textContent = 'Copier'; doBtn.disabled = true;
  doBtn.onclick = function() {
    var rows = getCurrentRows();
    var mealName = PLAN[srcDay][mealIdx] ? PLAN[srcDay][mealIdx].name : 'Repas';
    var mealTime = PLAN[srcDay][mealIdx] ? PLAN[srcDay][mealIdx].time : '';
    selectedDays.forEach(function(targetDay) {
      // Find the matching meal slot by index
      if(!PLAN[targetDay][mealIdx]) return;
      // Update plan state
      PLAN[targetDay][mealIdx].rows = rows.map(function(r){ return {foodId:r.foodId, qty:r.qty}; });
      // Rebuild just that meal card
      var targetPanel = document.getElementById(targetDay);
      if(!targetPanel) return;
      var cards = targetPanel.querySelectorAll('.meal-card');
      if(cards[mealIdx]) {
        var newCard = buildMealCard(PLAN[targetDay][mealIdx], mealIdx, targetDay);
        cards[mealIdx].replaceWith(newCard);
      }
      updateDay(targetDay); updateSaveInd(targetDay);
    });
    savePlan();
    wrap.remove();
    showToast('Repas copie sur ' + selectedDays.length + ' jour' + (selectedDays.length>1?'s':'') + ' !');
  };

  var cancelBtn = document.createElement('button'); cancelBtn.className = 'btn-cancel-copy';
  cancelBtn.textContent = 'Annuler';
  cancelBtn.onclick = function(){ wrap.remove(); };

  acts.appendChild(doBtn); acts.appendChild(cancelBtn);
  wrap.appendChild(acts);

  // Insert before add-row button
  var addRowBtn = card.querySelector('.btn-add-row');
  if(addRowBtn) card.insertBefore(wrap, addRowBtn); else card.appendChild(wrap);
}

// MOVE MEAL
// ═══════════════════════════════════════════
function editMealField(el, dayKey, mi, field) {
  var current = PLAN[dayKey][mi][field] || '';
  var inp = document.createElement('input');
  inp.value = current;
  inp.style.cssText = 'background:var(--card2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-family:Syne,sans-serif;font-size:' + (field==='time'?'.65':'.8') + 'rem;font-weight:700;padding:2px 5px;width:' + (field==='time'?'55px':'120px');
  el.replaceWith(inp);
  inp.focus(); inp.select();
  function save() {
    var val = inp.value.trim() || current;
    PLAN[dayKey][mi][field] = val;
    el.textContent = val;
    inp.replaceWith(el);
    savePlan();
  }
  inp.onblur = save;
  inp.onkeydown = function(e) {
    if(e.key === 'Enter') save();
    if(e.key === 'Escape') { inp.replaceWith(el); }
  };
}

function deleteMeal(dayKey, mealIdx) {
  // Sauvegarder état DOM → PLAN
  var panel = document.getElementById(dayKey);
  panel.querySelectorAll('.meal-card').forEach(function(card, ci) {
    if(!PLAN[dayKey][ci]) return;
    var rows = [];
    card.querySelectorAll('.food-row').forEach(function(r){ if(r._getState) rows.push(r._getState()); });
    PLAN[dayKey][ci].rows = rows;
  });
  // Supprimer le repas du plan
  PLAN[dayKey].splice(mealIdx, 1);
  // Rebuilder
  var wasActive = panel.classList.contains('active');
  var newPanel = buildDayPanel(dayKey);
  if(wasActive) newPanel.classList.add('active');
  panel.replaceWith(newPanel);
  updateDay(dayKey); updateSaveInd(dayKey); savePlan();
  if(wasActive) updateGlobal();
  showToast('Repas supprimé');
}

function moveMeal(dayKey, mealIdx, direction) {
  var meals = PLAN[dayKey];
  var targetIdx = mealIdx + direction;
  if(targetIdx < 0 || targetIdx >= meals.length) return;

  // Sauvegarder l'état DOM → PLAN avant de rebuilder
  var panel = document.getElementById(dayKey);
  panel.querySelectorAll('.meal-card').forEach(function(card, ci) {
    if(!PLAN[dayKey][ci]) return;
    var rows = [];
    card.querySelectorAll('.food-row').forEach(function(r){ if(r._getState) rows.push(r._getState()); });
    PLAN[dayKey][ci].rows = rows;
  });

  // Échanger les deux repas dans PLAN
  var tmp = meals[mealIdx];
  meals[mealIdx] = meals[targetIdx];
  meals[targetIdx] = tmp;

  // Rebuilder le panel en conservant la classe active
  var wasActive = panel.classList.contains('active');
  var newPanel = buildDayPanel(dayKey);
  if(wasActive) newPanel.classList.add('active');
  panel.replaceWith(newPanel);

  updateDay(dayKey); updateSaveInd(dayKey); savePlan();
  if(wasActive) updateGlobal();

  // Scroll vers le repas déplacé
  setTimeout(function(){
    var newCards = document.getElementById(dayKey).querySelectorAll('.meal-card');
    if(newCards[targetIdx]) newCards[targetIdx].scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 80);
}

function showAddMealForm(dayKey, panel) {
  // Toggle — remove if already open
  var existing = panel.querySelector('.add-meal-form');
  if(existing) { existing.remove(); return; }

  var form = document.createElement('div'); form.className = 'add-meal-form';
  form.innerHTML = '<h3>+ Nouveau repas</h3>'
    + '<div class="form-grid">'
    + '<div class="fg-item"><label>Heure</label>'
    + '<input type="text" id="new-meal-time" placeholder="Ex: 22h00" value=""></div>'
    + '<div class="fg-item"><label>Nom</label>'
    + '<input type="text" id="new-meal-name" placeholder="Ex: Collation soiree" value=""></div>'
    + '</div>'
    + '<div class="form-actions" style="margin-top:10px">'
    + '<button class="btn-save-form" style="background:var(--teal)" onclick="addMealToDay(\'' + dayKey + '\')">Ajouter</button>'
    + '<button class="btn-cancel-form" onclick="this.closest(\'.add-meal-form\').remove()">Annuler</button>'
    + '</div>';

  // Insérer après le bouton "Ajouter un repas" (à la fin du panel)
  panel.appendChild(form);
  setTimeout(function(){ var el=document.getElementById('new-meal-time'); if(el) el.focus(); }, 50);
}

function addMealToDay(dayKey) {
  var timeEl = document.getElementById('new-meal-time');
  var nameEl = document.getElementById('new-meal-name');
  var time = timeEl ? timeEl.value.trim() : '';
  var name = nameEl ? nameEl.value.trim() : '';
  if(!name) { showToast('Donne un nom au repas !'); return; }
  if(!time) time = '--h--';

  // Ajouter au plan
  var newMeal = {time:time, name:name, saved:false, rows:[{foodId:'poulet', qty:100}]};
  PLAN[dayKey].push(newMeal);

  // Rebuilder le panel en conservant la classe active
  var panel = document.getElementById(dayKey);
  var wasActive = panel && panel.classList.contains('active');
  var newPanel = buildDayPanel(dayKey);
  if(wasActive) newPanel.classList.add('active');
  if(panel) panel.replaceWith(newPanel);
  updateDay(dayKey); updateSaveInd(dayKey); savePlan();
  if(wasActive) updateGlobal();

  // Scroller vers le nouveau repas
  var newIdx = PLAN[dayKey].length - 1;
  setTimeout(function(){
    var cards = document.getElementById(dayKey).querySelectorAll('.meal-card');
    if(cards[newIdx]) cards[newIdx].scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);

  showToast('Repas "' + name + '" ajouté !');
}

// ═══════════════════════════════════════════
// FOOD PICKER MODAL
// ═══════════════════════════════════════════
var _fpCallback = null;
var _fpSelectedId = null;
var _fpCat = 'proteines';
var _fpQuery = '';

function openFoodPicker(currentId, callback) {
  _fpCallback = callback;
  _fpSelectedId = currentId;
  _fpCat = 'proteines';
  _fpQuery = '';
  document.getElementById('food-picker-modal').classList.add('open');
  document.getElementById('fp-search').value = '';
  fpBuildCats();
  fpRender();
  setTimeout(function(){ document.getElementById('fp-search').focus(); }, 80);
}

function closeFoodPicker() {
  document.getElementById('food-picker-modal').classList.remove('open');
  _fpCallback = null;
}

function fpBuildCats() {
  var wrap = document.getElementById('fp-cats'); wrap.innerHTML = '';
  CAT_KEYS.forEach(function(cat) {
    var btn = document.createElement('button'); btn.className = 'db-tab' + (cat===_fpCat?' active':'');
    btn.textContent = CAT_META[cat].label;
    btn.onclick = function(){ _fpCat=cat; fpBuildCats(); fpRender(); };
    wrap.appendChild(btn);
  });
  // "Tout" button
  var allBtn = document.createElement('button'); allBtn.className = 'db-tab' + (!_fpCat?'active':'');
  // Actually handle search across all cats via fpFilter
}

function fpFilter(q) {
  _fpQuery = q.trim().toLowerCase();
  fpRender();
}

function fpRender() {
  var body = document.getElementById('fp-body'); body.innerHTML = '';
  var foods = [];
  if(_fpQuery) {
    // Search across all categories
    CAT_KEYS.forEach(function(cat) {
      (DB[cat]||[]).forEach(function(f){
        if(f.name.toLowerCase().includes(_fpQuery)) foods.push({f:f, cat:cat});
      });
    });
  } else {
    (DB[_fpCat]||[]).forEach(function(f){ foods.push({f:f, cat:_fpCat}); });
  }

  if(!foods.length) {
    body.innerHTML = '<div class="empty-state">Aucun aliment trouvé</div>'; return;
  }

  foods.forEach(function(x) {
    var f = x.f;
    var item = document.createElement('div');
    item.className = 'fp-item' + (f.id===_fpSelectedId?' selected':'');
    var nameDiv = document.createElement('div'); nameDiv.className = 'fp-name';
    nameDiv.textContent = f.name + (f.custom?' ✦':'');
    var metaDiv = document.createElement('div'); metaDiv.className = 'fp-meta';
    metaDiv.innerHTML = '<span class="fp-kcal">'+f.kcal+' kcal</span><br>'
      + '<span style="color:var(--teal)">P'+f.p+'g</span> '
      + '<span style="color:var(--orange)">G'+f.g+'g</span> '
      + '<span style="color:var(--blue)">L'+f.l+'g</span>';
    item.appendChild(nameDiv); item.appendChild(metaDiv);
    item.onclick = function() {
      if(_fpCallback) _fpCallback(f.id);
      closeFoodPicker();
    };
    body.appendChild(item);
  });

  // Scroll to selected
  setTimeout(function(){
    var sel = body.querySelector('.fp-item.selected');
    if(sel) sel.scrollIntoView({block:'nearest'});
  }, 30);
}
